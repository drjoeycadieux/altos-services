<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Request App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Map Container - Full Screen -->
    <div id="map"></div>

    <!-- Uber-style Floating Panel -->
    <div class="uber-panel">
        <div class="panel-header">
            <h2>Request a ride</h2>
            <div class="user-avatar">
                <i class="fas fa-user"></i>
            </div>
        </div>

        <!-- Step 1: Location Inputs -->
        <div class="location-inputs">
            <div class="input-group">
                <div class="input-icon pickup-dot"></div>
                <input type="text" id="pickupLocation" placeholder="Current Location" readonly>
                <button class="clear-btn" onclick="clearLocation('pickup')"><i class="fas fa-times"></i></button>
            </div>
            <div class="connector-line"></div>
            <div class="input-group">
                <div class="input-icon dropoff-dot"></div>
                <input type="text" id="dropoffLocation" placeholder="Enter destination" readonly>
                <button class="clear-btn" onclick="clearLocation('dropoff')"><i class="fas fa-times"></i></button>
            </div>
            <p class="hint-text">Tap on the map to set pickup and dropoff points</p>
        </div>

        <!-- Step 2: Ride Selection (Hidden until locations selected) -->
        <div id="ride-selection" class="ride-selection hidden">
            <h3>Choose a ride</h3>
            <div class="ride-options">
                <div class="ride-option" data-type="UberX" data-price="15.50">
                    <div class="ride-image">
                        <i class="fas fa-car-side"></i>
                    </div>
                    <div class="ride-details">
                        <div class="ride-name">
                            UberX 
                            <span class="capacity"><i class="fas fa-user"></i> 4</span>
                        </div>
                        <div class="ride-time">12:04 PM drop-off</div>
                    </div>
                    <div class="ride-price">$15.50</div>
                </div>

                <div class="ride-option" data-type="Comfort" data-price="22.00">
                    <div class="ride-image">
                        <i class="fas fa-car"></i>
                    </div>
                    <div class="ride-details">
                        <div class="ride-name">
                            Comfort 
                            <span class="capacity"><i class="fas fa-user"></i> 4</span>
                        </div>
                        <div class="ride-time">12:04 PM drop-off</div>
                    </div>
                    <div class="ride-price">$22.00</div>
                </div>

                <div class="ride-option" data-type="Black" data-price="35.00">
                    <div class="ride-image">
                        <i class="fas fa-car-rear"></i>
                    </div>
                    <div class="ride-details">
                        <div class="ride-name">
                            Black 
                            <span class="capacity"><i class="fas fa-user"></i> 3</span>
                        </div>
                        <div class="ride-time">12:04 PM drop-off</div>
                    </div>
                    <div class="ride-price">$35.00</div>
                </div>
            </div>

            <!-- Payment Method -->
            <div class="payment-section">
                <div class="section-label">Payment</div>
                <select id="payment-method" class="payment-select">
                    <option value="personal">**** 4242 (Personal)</option>
                    <option value="business">**** 8899 (Business)</option>
                    <option value="cash">Cash</option>
                    <option value="wallet">Digital Wallet</option>
                </select>
            </div>

            <!-- Confirm Button -->
            <button id="confirm-ride" class="confirm-btn">
                Confirm UberX
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="loading-state hidden">
            <div class="spinner"></div>
            <p>Finding your ride...</p>
        </div>
    </div>

    <!-- Active Rides List (Minimal Overlay) -->
    <div class="active-rides-toggle" onclick="toggleActiveRides()">
        <i class="fas fa-list"></i>
    </div>
    <div id="active-rides-panel" class="active-rides-panel hidden">
        <div class="panel-header-small">
            <h3>Nearby Rides</h3>
            <button onclick="toggleActiveRides()"><i class="fas fa-times"></i></button>
        </div>
        <div id="active-rides-list" class="rides-list">
            <!-- Rides injected here -->
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
